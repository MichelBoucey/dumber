name: dumber
on: [push]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go 1.26
        uses: actions/setup-go@v6
        with:
          go-version: 1.26

      - name: Check out source code
        uses: actions/checkout@v6

      - name: Build
        env:
          GOPROXY: "https://proxy.golang.org"
        run: go build -o dumber

      - name: Tests
        run: make test

