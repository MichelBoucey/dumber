name: Rust CI

on:
  push:
    branches:
      - rust-implementation
  pull_request:
    branches:
      - rust-implementation

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build
        run: cargo build --release
